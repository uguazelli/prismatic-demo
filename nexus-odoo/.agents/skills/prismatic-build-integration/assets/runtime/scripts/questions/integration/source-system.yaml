# Source system — component, connection, credentials, API docs
#
# Connection flow (canonical ordering):
#   source_system → source_component (lookup) → source_connection_existing (lookup)
#     → BRANCH on result:
#       A) Usable connection found → present to user → if confirmed, auto-populate type + strategy
#       B) Only build-only found → ask connection_type → ask connection strategy
#       C) None found → ask connection_type → ask connection strategy
#     → IF customer_activated or org_activated → offer to create SCV
#     → IF customer_activated or org_activated with no SCV → offer to create one

source_system:
  question: "What is the SOURCE system name?"
  type: text
  inference: allowed
  scope: integration
  agent_context: >
    This identifies where data comes from. For webhook triggers, the source system sends
    data TO Prismatic via HTTP. A source component is only needed when Prismatic must call
    the source system's API (e.g., auto-registering webhooks, fetching additional data,
    polling). If the user only described receiving webhooks with no API callbacks, a source
    component is NOT needed. Name the specific product (e.g., "Salesforce", "Shopify"),
    not a generic category.

source_component:
  question: "Search for existing Prismatic components for the source system."
  type: lookup
  inference: prohibited
  scope: integration
  skippable: true
  lookup:
    script: scripts/integrations/find-components.ts
    args: ["${source_system}"]
  depends_on: [source_system]
  note: >
    Even for webhook triggers, components may provide webhookLifecycleHandlers
    (auto-register/deregister webhooks on deploy/delete) or specialized trigger
    functions (e.g., hashHmacWebhookTrigger for signature verification).
  agent_context: >
    Run the lookup script to search for components. If a component is found, record the
    FULL component JSON object (the full object with key, label, connections array, etc.).
    If NO component is found, present the situation to the user: "No Prismatic component
    exists for [system]. I can research the API and build direct HTTP calls, or you could
    build a custom component first. Which approach?" Record "none" only after the user
    confirms the direct HTTP approach. "none" triggers the API docs URL question downstream.
    Do NOT record an empty string — it will not be recognized as answered.
    For webhook triggers: SKIP this if the integration only receives webhooks from the
    source (no API callbacks needed). SEARCH if the integration needs to make API calls
    TO the source system. If no component exists, the flow will use direct HTTP calls.
  docs:
    - https://prismatic.io/docs/integrations/code-native/existing-components.md

source_connection_existing:
  question: "Search for existing connections for the source system."
  type: lookup
  inference: prohibited
  scope: integration
  lookup:
    script: scripts/integrations/search-connections.ts
    args: ["${source_system}"]
  depends_on: [source_component]
  condition:
    source_component: { not_empty: true }
  agent_context: |
    This search runs automatically after the component is found. It checks for existing
    reusable connections in the org. The result determines the next steps:

    BRANCH A — Usable connection found (result is a connection object):
      Record the full connection object as the answer.
      The record-choices script will auto-infer source_connection_type from the object.
      It will also emit a <connection-found> directive telling you to present the
      connection to the user: "I found an existing [type] connection for [system]: [name]. Use this one?"
      - If user says YES: write source_connection based on the connectionType field
        (CUSTOMER → customer_activated, ORG → org_activated). DONE for this system.
      - If user says NO: the source_connection_type and source_connection questions
        will appear as pending. Proceed to ask them.

    BRANCH B — Only build-only connections found:
      Record "solo_build_only". The source_connection_type and source_connection
      questions will appear as pending.
      Build-only connections work for testing in the designer but CANNOT be used
      for production deployments with organizationActivatedConnection().
      Present this context when asking the connection strategy question.

    BRANCH C — No connections found:
      Record "none". The source_connection_type and source_connection questions
      will appear as pending. Proceed to ask them.
  note: >
    This search fires BEFORE the strategy choice. The result feeds into conditions
    on source_connection_type (only asked when "none" or "solo_build_only").
    Build-only connections (connectionType: "Build-Only") cannot be used for production.

source_connection_type:
  question: "Which connection/auth type for the source component?"
  type: lookup
  inference: prohibited
  scope: integration
  skippable: true
  lookup:
    note: "Extract connection types from the source_component search results. Present each connection option (e.g., OAuth2, API Key, Basic Auth) to the user."
    source: source_component.connections
  depends_on: [source_component, source_connection_existing]
  condition:
    source_component: { not_empty: true }
    source_connection_existing: { in: ["none", "solo_build_only"] }
  note: >
    This question is SKIPPED when an existing usable connection was found (Branch A above)
    because the connection type is auto-inferred from the existing connection object.
    It only appears when no usable connections exist (Branches B and C).
    Store the FULL connection object from the lookup result, not just the key string.
  agent_context: |
    <lookup-contract>
      This question is ONLY about which auth method (OAuth 2.0, API Key, Token-Based Auth, etc.).
      The NEXT question asks who manages the connection (org, customer, manifest). Do not combine them.
      Extract connection options from the source_component answer's `connections` array.
      Present each one to the user with its label and auth_type.
      Write the FULL connection JSON object from the array — not a string label, not a slug.
      Example: '{"key":"oauth2-dynamic-inputs","label":"OAuth 2.0","auth_type":"OAuth2","required_inputs":[...]}'
    </lookup-contract>

source_connection:
  question: "How should the source connection be managed?"
  type: choice
  inference: prohibited
  scope: integration
  choices:
    - customer_activated
    - org_activated
    - no_connection
  depends_on: [source_connection_type]
  condition:
    source_connection_type: { not_empty: true }
  agent_context: |
    <present-as>
      <option value="customer_activated" recommended="true">Customer-activated (reusable) — each customer provides and authorizes their own credentials. The connection is defined once in Prismatic and reusable across integrations. Customers see an "Authorize" button in the config wizard.</option>
      <option value="org_activated">Org-activated (reusable) — your team provides credentials on behalf of customers. Can be per-customer (unique creds per customer) or global (one shared connection for all). Customers never see this connection.</option>
      <option value="no_connection">No auth needed — public API or webhook-only.</option>
    </present-as>

    If source_connection_existing is "solo_build_only":
      Explain that build-only connections exist for testing but cannot be used for production
      org_activated deployments. Recommend customer_activated.

    Recommend customer_activated for most cases.

    The code pattern (manifest helper, connectionConfigVar, etc.) is determined automatically
    during code generation based on whether a component manifest exists. The user does not
    need to choose between these — only who manages the credentials.
  implications:
    "customer_activated": >
      Each customer provides and authorizes their own credentials during instance setup.
      Connection defined once in Prismatic, reusable across integrations.
      Code gen: customerActivatedConnection() if SCV exists, or manifest helper on configPages.
    "org_activated": >
      Your team provides credentials — either unique per customer or one shared connection
      for all customers. Not visible to customers in the config wizard.
      Code gen: organizationActivatedConnection() in scopedConfigVars.
    "no_connection": >
      No authentication required. Suitable for public endpoints or when auth is handled
      differently (e.g., API key passed as a config variable).
  on_answer:
    customer_activated: >
      If no reusable connection exists yet (source_connection_existing is "none" or "solo_build_only"),
      offer to create one: "No reusable customer-activated connection exists for [system]. Want me to
      create one?" If yes, run create-organization-connection with --strategy customer-activated.
      If the user declines, the connection will be configured post-deploy in the admin UI.
    org_activated: >
      The next question (source_org_connection_scope) asks about per-customer vs global.
      After that, if no reusable connection exists yet, offer to create one with
      create-organization-connection using the appropriate --strategy.
      WARNING: Build-only connections CANNOT be used with organizationActivatedConnection().
      If only build-only connections exist, warn the user and suggest customer_activated instead.
  docs:
    - https://prismatic.io/docs/integrations/connections.md
  cookbook_section: "Connection Strategy Code Paths"

source_org_connection_scope:
  question: "Should the org provide unique credentials per customer, or use one shared connection for all customers?"
  type: choice
  choices: [per_customer, global]
  inference: prohibited
  scope: integration
  depends_on: [source_connection]
  condition:
    source_connection: org_activated
  agent_context: |
    <present-as>
      <option value="per_customer">Per-customer credentials — your team provides separate credentials for each customer. Each customer gets their own connection instance managed by your org.</option>
      <option value="global">One shared connection — a single set of credentials shared across all customer instances.</option>
    </present-as>
  implications:
    per_customer: >
      Creates an org-activated customer-scoped connection (SCV). Your team creates credentials
      for each customer before deploying to them. Customers never see this connection.
    global: >
      Creates an org-activated org-scoped connection (SCV) with credentials stored directly
      on the connection definition. No per-customer credentials needed. All instances share.

source_api_docs_url:
  question: "API documentation URL for the source system (e.g., https://developers.example.com/api)"
  type: text
  inference: allowed
  scope: integration
  validate: "^https?://"
  depends_on: [source_component]
  condition:
    source_component: { empty: true }
  agent_context: >
    When no Prismatic component exists for the source system, we need API documentation
    to generate direct HTTP calls. The agent will fetch this URL to discover endpoints,
    authentication methods, and payload shapes for code generation.
