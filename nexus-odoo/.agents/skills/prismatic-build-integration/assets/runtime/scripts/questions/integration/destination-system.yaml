# Destination system — component, connection, credentials, API docs
#
# Connection flow mirrors source-system.yaml. See that file for the canonical ordering.

destination_system:
  question: "What is the DESTINATION system name?"
  type: text
  inference: allowed
  scope: integration
  agent_context: >
    The destination system is where data is sent — the system that receives the transformed
    data from the flow. Name the specific product (e.g., "Slack", "NetSuite", "Zendesk"),
    not a generic category.

same_system_check:
  question: "Source and destination are the same system. Reuse the same component and connection?"
  type: choice
  inference: prohibited
  scope: integration
  choices:
    - "reuse"
    - "separate"
  depends_on: [source_system, destination_system]
  condition:
    destination_system: { equals_answer: source_system }
  auto_populate:
    when: "reuse"
    copy:
      destination_component: source_component
      destination_connection_type: source_connection_type
      destination_connection: source_connection
  agent_context: >
    When source and destination are the same system (e.g., Salesforce-to-Salesforce data
    transformation), you can reuse the same component and connection. This avoids duplicate
    config page entries and keeps the architecture simple. If you need different auth for
    read vs write (e.g., different API permissions), choose separate configurations.
  implications:
    "reuse": >
      Auto-copies source component, connection type, and connection strategy to the
      destination. One set of credentials, one config page entry. Simplest approach.
    "separate": >
      Separate component search and connection setup for the destination. Use when
      you need different permissions, different auth methods, or different API access
      for the destination side.

destination_component:
  question: "Search for existing Prismatic components for the destination system."
  type: lookup
  inference: prohibited
  scope: integration
  skippable: true
  lookup:
    script: scripts/integrations/find-components.ts
    args: ["${destination_system}"]
  depends_on: [destination_system]
  condition:
    same_system_check: { not: "reuse" }
  agent_context: >
    Run the lookup script to search for components. If a component is found, record the
    FULL component JSON object (the full object with key, label, connections array, etc.).
    If NO component is found, present the situation to the user: "No Prismatic component
    exists for [system]. I can research the API and build direct HTTP calls, or you could
    build a custom component first. Which approach?" Record "none" only after the user
    confirms. Do NOT record an empty string — it will not be recognized as answered.
  docs:
    - https://prismatic.io/docs/integrations/code-native/existing-components.md

destination_connection_existing:
  question: "Search for existing connections for the destination system."
  type: lookup
  inference: prohibited
  scope: integration
  lookup:
    script: scripts/integrations/search-connections.ts
    args: ["${destination_system}"]
  depends_on: [destination_component]
  condition:
    destination_component: { not_empty: true }
  agent_context: |
    This search runs automatically after the component is found. The result determines next steps:

    BRANCH A — Usable connection found (result is a connection object):
      Record the full connection object as the answer.
      The record-choices script will auto-infer destination_connection_type from the object.
      It will also emit a <connection-found> directive telling you to present the
      connection to the user: "I found an existing [type] connection for [system]: [name]. Use this one?"
      - If user says YES: write destination_connection based on the connectionType field
        (CUSTOMER → customer_activated, ORG → org_activated). DONE for this system.
      - If user says NO: the destination_connection_type and destination_connection questions
        will appear as pending. Proceed to ask them.

    BRANCH B — Only build-only connections found:
      Record "solo_build_only". The destination_connection_type and destination_connection
      questions will appear as pending.
      Build-only connections work for testing but CANNOT be used for production org_activated.

    BRANCH C — No connections found:
      Record "none". Proceed to destination_connection_type.
  note: >
    This search fires BEFORE the strategy choice. The result feeds into conditions
    on destination_connection_type (only asked when "none" or "solo_build_only").

destination_connection_type:
  question: "Which connection/auth type for the destination component?"
  type: lookup
  inference: prohibited
  scope: integration
  skippable: true
  lookup:
    note: "Extract connection types from the destination_component search results."
    source: destination_component.connections
  depends_on: [destination_component, destination_connection_existing]
  condition:
    destination_component: { not_empty: true }
    destination_connection_existing: { in: ["none", "solo_build_only"] }
  note: >
    Skipped when an existing usable connection was found (Branch A) because the type
    is auto-inferred. Only appears when no usable connections exist (Branches B and C).
    Store the FULL connection object from the lookup result.
  agent_context: |
    <lookup-contract>
      This question is ONLY about which auth method. The NEXT question asks who manages the connection.
      Extract connection options from the destination_component answer's `connections` array.
      Present each one with its label and auth_type.
      Write the FULL connection JSON object — not a string.
    </lookup-contract>

destination_connection:
  question: "How should the destination connection be managed?"
  type: choice
  inference: prohibited
  scope: integration
  choices:
    - customer_activated
    - org_activated
    - no_connection
  depends_on: [destination_connection_type]
  condition:
    destination_connection_type: { not_empty: true }
  agent_context: |
    <present-as>
      <option value="customer_activated" recommended="true">Customer-activated (reusable) — each customer authorizes their own account. Reusable across integrations.</option>
      <option value="org_activated">Org-activated (reusable) — your team configures credentials. Can be per-customer or one shared connection.</option>
      <option value="no_connection">No auth needed.</option>
    </present-as>

    If destination_connection_existing is "solo_build_only":
      Explain that build-only connections exist for testing but cannot be used for production
      org_activated deployments. Recommend customer_activated.

    Recommend customer_activated for most cases.
    Code pattern is determined automatically during code gen.
  implications:
    "customer_activated": >
      Each customer authorizes their own account. Reusable across integrations.
    "org_activated": >
      One shared connection managed centrally. Cannot use build-only connections.
    "no_connection": >
      No auth required for the destination.
  on_answer:
    customer_activated: >
      If no reusable connection exists yet, offer to create one with create-organization-connection.
    org_activated: >
      The next question (destination_org_connection_scope) asks about per-customer vs global.
      After that, offer to create SCV if none exists.
      WARNING: Build-only connections CANNOT be used with organizationActivatedConnection().
  docs:
    - https://prismatic.io/docs/integrations/connections.md
  cookbook_section: "Connection Strategy Code Paths"

destination_org_connection_scope:
  question: "Should the org provide unique credentials per customer, or use one shared connection for all customers?"
  type: choice
  choices: [per_customer, global]
  inference: prohibited
  scope: integration
  depends_on: [destination_connection]
  condition:
    destination_connection: org_activated
  agent_context: |
    <present-as>
      <option value="per_customer">Per-customer credentials — your team provides separate credentials for each customer.</option>
      <option value="global">One shared connection — a single set of credentials shared across all customer instances.</option>
    </present-as>
  implications:
    per_customer: >
      Creates an org-activated customer-scoped connection (SCV). Your team creates credentials
      for each customer before deploying to them.
    global: >
      Creates an org-activated org-scoped connection (SCV) with credentials stored directly
      on the connection definition. All instances share.

destination_api_docs_url:
  question: "API documentation URL for the destination system"
  type: text
  inference: allowed
  scope: integration
  validate: "^https?://"
  depends_on: [destination_component]
  condition:
    destination_component: { empty: true }
  agent_context: >
    When no Prismatic component exists for the destination, we need API docs to generate
    direct HTTP calls.
