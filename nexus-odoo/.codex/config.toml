[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@0.0.78"]
startup_timeout_sec = 60

[mcp_servers.prism]
command = "npx"
args = ["-y", "@prismatic-io/prism-mcp@1.5.0", ".", "integration", "component"]
startup_timeout_sec = 60

[mcp_servers.prism.env]
PRISMATIC_URL = "https://app.prismatic.io"
