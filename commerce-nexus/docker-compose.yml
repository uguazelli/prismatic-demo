services:
  demo-saas-api:
    build: .
    image: veridata-commerce-nexus-api:latest
    container_name: demo-saas-api
    env_file:
      - path: .env
        required: false
    environment:
      APP_NAME: ${APP_NAME:-Veridata Commerce Nexus}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://demo:demo@veridata.demo-saas-postgres:5432/demo_saas}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change-me-admin-key}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      PRISMATIC_ORGANIZATION_ID: ${PRISMATIC_ORGANIZATION_ID:-T3JnYW5pemF0aW9uOmUyZDdiNTY5LWViN2ItNDAyYy04ZTYyLWRiOTQxMTE0OWI3Yg==}
      PRISMATIC_WEBHOOK_URL: ${PRISMATIC_WEBHOOK_URL:-}
      PRISMATIC_API_KEY: ${PRISMATIC_API_KEY:-}
      PRISMATIC_DISPATCH_INTERVAL_SECONDS: ${PRISMATIC_DISPATCH_INTERVAL_SECONDS:-2}
      PRISMATIC_DISPATCH_BATCH_SIZE: ${PRISMATIC_DISPATCH_BATCH_SIZE:-25}
      PRISMATIC_DISPATCH_MAX_ATTEMPTS: ${PRISMATIC_DISPATCH_MAX_ATTEMPTS:-5}
      PRISMATIC_WEBHOOK_TIMEOUT_SECONDS: ${PRISMATIC_WEBHOOK_TIMEOUT_SECONDS:-10}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >-
      sh -c "uv run alembic upgrade head &&
      uv run python -m app.seed &&
      uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
    networks:
      veridata.network:
        aliases:
          - veridata.demo-saas-api

  postgres:
    image: postgres:16-alpine
    container_name: demo-saas-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-demo_saas}
      POSTGRES_USER: ${POSTGRES_USER:-demo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      veridata.network:
        aliases:
          - veridata.demo-saas-postgres

  adminer:
    image: adminer:5
    container_name: demo-saas-adminer
    profiles: ["tools"]
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      veridata.network:
        aliases:
          - veridata.demo-saas-adminer

volumes:
  postgres_data:

networks:
  veridata.network:
    name: veridata.network
    external: true
